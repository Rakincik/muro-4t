<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MURO LMS</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: linear-gradient(160deg, #060E1A 0%, #0A1931 40%, #122648 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
                     env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
        }

        .splash-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            animation: containerFadeIn 0.6s ease-out;
        }

        /* Logo */
        .logo-wrapper {
            position: relative;
            width: 88px;
            height: 88px;
        }

        .logo {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, #1B3B6F 0%, #2A5298 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: white;
            position: relative;
            z-index: 1;
            box-shadow: 0 8px 32px rgba(27, 59, 111, 0.4),
                        0 2px 8px rgba(0, 0, 0, 0.2);
            animation: logoAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        .logo-glow {
            position: absolute;
            inset: -8px;
            border-radius: 30px;
            background: radial-gradient(circle, rgba(27, 59, 111, 0.3) 0%, transparent 70%);
            animation: glowPulse 2s ease-in-out infinite 1s;
        }

        /* App Name */
        .app-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: white;
            opacity: 0;
            animation: textAppear 0.6s ease-out 0.6s both;
        }

        .app-subtitle {
            font-size: 12px;
            font-weight: 500;
            color: rgba(160, 174, 192, 0.6);
            letter-spacing: 0.08em;
            margin-top: -16px;
            opacity: 0;
            animation: textAppear 0.6s ease-out 0.8s both;
        }

        /* Loading indicator */
        .loader {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 16px;
            opacity: 0;
            animation: textAppear 0.6s ease-out 1s both;
        }

        .loader-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #1B3B6F;
        }

        .loader-dot:nth-child(1) { animation: dotBounce 1.4s ease-in-out infinite 0s; }
        .loader-dot:nth-child(2) { animation: dotBounce 1.4s ease-in-out infinite 0.2s; }
        .loader-dot:nth-child(3) { animation: dotBounce 1.4s ease-in-out infinite 0.4s; }

        /* Decorative gradient orb */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            opacity: 0.15;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: #1B3B6F;
            top: -100px;
            right: -80px;
            animation: orbFloat 6s ease-in-out infinite;
        }

        .orb-2 {
            width: 200px;
            height: 200px;
            background: #2A5298;
            bottom: -60px;
            left: -60px;
            animation: orbFloat 8s ease-in-out infinite 2s;
        }

        /* Animations */
        @keyframes containerFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes logoAppear {
            from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            to { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.15); opacity: 0.5; }
        }

        @keyframes textAppear {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1.2); opacity: 1; background: #A0AEC0; }
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }
    </style>
</head>
<body>
    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Splash content -->
    <div class="splash-container">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <div class="logo">M</div>
        </div>
        <p class="app-name">MURO LMS</p>
        <p class="app-subtitle">Uzaktan Eğitim Platformu</p>
        <div class="loader">
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
        </div>
    </div>
</body>
</html>
